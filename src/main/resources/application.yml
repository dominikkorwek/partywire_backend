server:
  port: ${PORT:8081}
  forward-headers-strategy: framework
  servlet:
    session:
      cookie:
        same-site: ${SESSION_COOKIE_SAME_SITE:lax}
        secure: ${SESSION_COOKIE_SECURE:false}

spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: kumple

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/kumple}
    username: ${SPRING_DATASOURCE_USERNAME:kumple}
    password: ${SPRING_DATASOURCE_PASSWORD:kumple}
    driver-class-name: org.postgresql.Driver

  jpa:
    defer-datasource-initialization: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: ${SPRING_SQL_INIT_MODE:always}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dev-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:dev-google-client-secret}
            scope:
              - openid
              - profile
              - email

app:
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  presence-timeout-ms: ${PRESENCE_TIMEOUT_MS:15000}
  presence-check-interval-ms: ${PRESENCE_CHECK_INTERVAL_MS:5000}
